{% extends 'base.html' %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div style="text-align:center;max-width:480px;">

    <div style="font-family:'Sora',sans-serif;font-size:clamp(6rem,20vw,10rem);font-weight:800;line-height:1;
      background:linear-gradient(135deg,#1e3a6e,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-4px;margin-bottom:24px;">
      404
    </div>

    <div style="width:56px;height:56px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;">
      <i class="fas fa-search" style="font-size:1.4rem;color:#ef4444;"></i>
    </div>

    <h2 style="font-family:'Sora',sans-serif;font-weight:800;font-size:1.5rem;color:var(--text);margin-bottom:10px;">
      Page Not Found
    </h2>
    <p style="color:var(--text3);line-height:1.8;margin-bottom:32px;font-size:0.95rem;">
      The page you're looking for doesn't exist. Maybe the item was already found? 😄
    </p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="/" class="btn btn-primary">
        <i class="fas fa-home me-2"></i>Go Home
      </a>
      <a href="/items/" class="btn btn-ghost">
        <i class="fas fa-search me-2"></i>Browse Items
      </a>
    </div>

  </div>
</div>
{% endblock %}
