{% extends 'base.html' %}
{% block title %}Forgot Password — LostNFound{% endblock %}
{% block content %}
<div class="container" style="max-width:450px;">
    <div class="form-card my-5">
        <div class="text-center mb-4">
            <i class="fas fa-key fa-3x text-warning mb-3"></i>
            <h2 class="fw-bold">Forgot Password?</h2>
            <p class="text-muted">Enter your email and we'll send you a reset link.</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" name="email" class="form-control form-control-lg" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="fas fa-paper-plane me-2"></i>Send Reset Link
            </button>
        </form>
        <hr>
        <p class="text-center mb-0"><a href="{% url 'login' %}"><i class="fas fa-arrow-left me-1"></i>Back to Login</a></p>
    </div>
</div>
{% endblock %}
