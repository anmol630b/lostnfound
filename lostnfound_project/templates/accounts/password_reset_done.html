{% extends 'base.html' %}
{% block title %}Email Sent — LostNFound{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
    <div class="form-card my-5 text-center">
        <i class="fas fa-envelope-open-text fa-4x text-success mb-3"></i>
        <h2 class="fw-bold">Check Your Email!</h2>
        <p class="text-muted mb-4">We've sent a password reset link to your email address. Please check your inbox (and spam folder).</p>
        <a href="{% url 'login' %}" class="btn btn-primary px-5"><i class="fas fa-sign-in-alt me-2"></i>Back to Login</a>
    </div>
</div>
{% endblock %}
