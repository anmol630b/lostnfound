{% extends 'base.html' %}
{% block title %}Password Reset Done — LostNFound{% endblock %}
{% block content %}
<div class="container" style="max-width:450px;">
    <div class="form-card my-5 text-center">
        <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
        <h2 class="fw-bold">Password Reset Successful!</h2>
        <p class="text-muted mb-4">Your password has been changed successfully. You can now log in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5">
            <i class="fas fa-sign-in-alt me-2"></i>Login Now
        </a>
    </div>
</div>
{% endblock %}
